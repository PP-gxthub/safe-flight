<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Special Flight ✈️</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a1;
            --sky-blue: #aad3df;
            --success-green: #4CAF50;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Kanit', sans-serif; background-color: var(--sky-blue);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; text-align: center;
        }

        /* พื้นหลังบับเบิ้ล */
        #global-bg-elements {
            position: fixed; inset: 0; pointer-events: none; z-index: 1;
        }

        .floating-item {
            position: absolute; bottom: -50px; pointer-events: none;
            animation: floatUp 6s linear forwards; z-index: 2;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }
        .bubble {
            background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; box-shadow: inset -5px -5px 10px rgba(255,255,255,0.5), inset 5px 5px 10px rgba(0,0,0,0.05);
        }

        /* 1. หน้านับเวลา & พลุหลัง Timer */
        #prep-area {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        #timer-fireworks {
            position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 999;
        }
        .timer-box { 
            width: 280px; padding: 25px; background: rgba(255, 255, 255, 0.9);
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            backdrop-filter: blur(5px); position: relative; z-index: 1001;
        }
        .timer { font-size: 2.8rem; font-weight: bold; color: var(--primary-pink); font-family: monospace; }

        /* 2. หน้าบิน (ลบเส้นทางและเมฆออกตามสั่ง) */
        #flight-area { display: none; position: fixed; inset: 0; z-index: 500; }
        
        .avatar-circle {
            width: 70px; height: 70px; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            background-size: cover; background-position: center;
        }

        #dest-node { 
            position: absolute; top: 12vh; left: 50%; transform: translateX(-50%);
            z-index: 520;
        }
        .dog-avatar { background-image: url('dog.jpg'); }

        #plane-wrapper {
            position: absolute; left: 50%; bottom: 10vh;
            transform: translateX(-50%); z-index: 550;
        }
        .cat-avatar { background-image: url('cat.jpg'); }

        .wiggle-bubble {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            background: white; padding: 6px 15px; border-radius: 15px;
            font-size: 0.85rem; color: var(--primary-pink); white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: bounceWiggle 2s infinite;
        }
        @keyframes bounceWiggle {
            0%, 100% { transform: translateY(0) translateX(-50%); }
            50% { transform: translateY(-10px) translateX(-50%); }
        }

        /* 3. Pop-up & Final */
        #landed-popup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        #fireworks-overlay { position: fixed; inset: 0; z-index: 1990; pointer-events: none; }

        .popup-card {
            background: white; width: 80%; max-width: 300px; padding: 30px;
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .btn-confirm {
            background: var(--success-green); color: white; border: none;
            padding: 12px 35px; border-radius: 50px; font-size: 1rem;
            margin-top: 20px; cursor: pointer; font-family: 'Kanit';
        }

        #final-photo-area {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2100;
        }
        .photo-wrap { position: relative; width: 280px; animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        img#couple-img {
            width: 100%; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 6px solid white;
        }
        .chat-bubble-final {
            position: absolute; top: -60px; right: -10px;
            background: var(--primary-pink); color: white;
            padding: 10px 20px; border-radius: 20px 20px 20px 0;
            font-size: 0.9rem; animation: bounceFinal 2s infinite;
        }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes bounceFinal { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="fireworks-overlay"></canvas>
    
    <div id="global-bg-elements"></div>

    <div id="prep-area">
        <canvas id="timer-fireworks"></canvas>
        <div class="timer-box">
            <div style="color: #888; font-size: 0.9rem; margin-bottom: 10px;">หมูจะได้บินในอีก</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <div id="flight-area">
        <div id="dest-node">
            <div class="wiggle-bubble">เค้ารอหมูอ้วน</div>
            <div class="avatar-circle dog-avatar"></div>
        </div>
        <div id="plane-wrapper">
            <div class="avatar-circle cat-avatar"></div>
            </div>
    </div>

    <div id="landed-popup-overlay">
        <div class="popup-card">
            <p style="color: var(--primary-pink); margin: 10px 0 5px; font-size: 1.5rem;"><b>คงถึงแล้วใช่ไหม</b></p>
            <p style="color: #8e8e8e; margin: 10px 0 5px; font-size: 0.9rem;">ตอนนี้รออยู่ชั้นล่างสุด ประตู 12</p>
            <button class="btn-confirm" onclick="showFinalSurprise()">รับทราบ</button>
        </div>
    </div>

    <div id="final-photo-area">
        <div class="photo-wrap">
            <div class="chat-bubble-final">มาถึงแล้วกอดกันนะ ^^</div>
            <img src="cat.jpg" alt="Our Photo" id="couple-img">
        </div>
    </div>

    <script>
        // --- 🟢 ตั้งเวลาตรงนี้ ---
        const takeoffTime = new Date("2026-04-07T18:43:00+07:00").getTime();
        const landingTime = new Date("2026-04-07T18:43:30+07:00").getTime(); 
        
        let landedTriggered = false;
        let timerFireworksStarted = false;

        function spawnFloatingItem() {
            const container = document.getElementById('global-bg-elements');
            const item = document.createElement('div');
            item.className = 'floating-item';
            const isFlight = document.getElementById('flight-area').style.display === 'block';
            const showHeart = !isFlight && Math.random() > 0.8;
            if (showHeart) {
                item.innerHTML = `<span style="font-size: 14px;">❤️</span>`;
            } else {
                const size = Math.random() * 30 + 10;
                item.className += ' bubble';
                item.style.width = size + 'px';
                item.style.height = size + 'px';
            }
            item.style.left = Math.random() * 100 + '%';
            item.style.animationDuration = (Math.random() * 3 + 5) + 's';
            container.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }
        setInterval(spawnFloatingItem, 500);

        function updateStatus() {
            const now = new Date().getTime();
            
            if (now < takeoffTime) {
                displayTime(takeoffTime - now);
            } 
            else if (now >= takeoffTime && now < landingTime) {
                // เมื่อเริ่มบิน ให้แสดงพลุที่หน้า Timer แวบหนึ่งก่อนเปลี่ยนหน้า
                if (!timerFireworksStarted) {
                    triggerFireworks('timer-fireworks');
                    timerFireworksStarted = true;
                    // ดีเลย์เล็กน้อยเพื่อให้เห็นพลุก่อนหน้าจอกลายเป็นหน้าบิน
                    setTimeout(() => {
                        document.getElementById('prep-area').classList.add('hidden');
                        document.getElementById('flight-area').style.display = 'block';
                    }, 800); 
                }

                const progress = (now - takeoffTime) / (landingTime - takeoffTime);
                const startY = window.innerHeight * 0.85; 
                const endY = window.innerHeight * 0.22; 
                const currentY = startY - (progress * (startY - endY));
                document.getElementById('plane-wrapper').style.top = currentY + 'px';
            } 
            else {
                if (!landedTriggered) {
                    showLandedPopup();
                    landedTriggered = true;
                }
            }
        }

        function displayTime(ms) {
            const h = Math.floor(ms / 3600000).toString().padStart(2, '0');
            const m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
        }

        function showLandedPopup() {
            document.getElementById('flight-area').style.display = 'none';
            document.getElementById('landed-popup-overlay').style.display = 'flex';
            triggerFireworks('fireworks-overlay'); 
        }

        function showFinalSurprise() {
            document.getElementById('landed-popup-overlay').style.display = 'none';
            document.getElementById('final-photo-area').style.display = 'flex';
        }

        // ระบบพลุ (ใช้ได้ทั้งหน้า Timer และหน้าจบ)
        function triggerFireworks(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];

            function createFirework() {
                const x = canvas.width / 2; // ยิงจากตรงกลาง
                const color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                for (let i = 0; i < 40; i++) {
                    particles.push({
                        x: x, y: canvas.height,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() * -12) - 5,
                        alpha: 1, color: color
                    });
                }
            }

            let fireworkInterval = setInterval(createFirework, 500);
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach((p,i)=>{
                    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= 0.01;
                    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill();
                    if(p.alpha <= 0) particles.splice(i,1);
                });
                requestAnimationFrame(anim);
            }
            anim();
            // หยุดสร้างพลุใหม่หลังจาก 5 วินาที
            setTimeout(() => clearInterval(fireworkInterval), 5000);
        }

        setInterval(updateStatus, 100);
    </script>
</body>
</html>
